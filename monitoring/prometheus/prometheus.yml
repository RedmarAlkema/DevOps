global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: api-gateway
    metrics_path: /metrics
    static_configs:
      - targets:
          - api-gateway:3000

  - job_name: auth
    metrics_path: /metrics
    static_configs:
      - targets:
          - auth:5000

  - job_name: clock
    metrics_path: /metrics
    static_configs:
      - targets:
          - clock:3001

  - job_name: upload
    metrics_path: /metrics
    static_configs:
      - targets:
          - upload:3002

  - job_name: target
    metrics_path: /metrics
    static_configs:
      - targets:
          - target:3003

  - job_name: read
    metrics_path: /metrics
    static_configs:
      - targets:
          - read:3004

  - job_name: score
    metrics_path: /metrics
    static_configs:
      - targets:
          - score:3005

  - job_name: mail
    metrics_path: /metrics
    static_configs:
      - targets:
          - mail:3006

  - job_name: blackbox-health
    metrics_path: /probe
    params:
      module:
        - http_2xx
    static_configs:
      - targets:
          - http://api-gateway:3000/health
          - http://auth:5000/health
          - http://clock:3001/health
          - http://upload:3002/health
          - http://target:3003/health
          - http://read:3004/health
          - http://score:3005/health
          - http://mail:3006/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
