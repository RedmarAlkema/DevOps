name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint Root Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  service-install:
    name: Verify Service Install (${{ matrix.service.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: API Gateway
            path: API-gateway
          - name: Auth
            path: auth
          - name: Clock
            path: microservices/clock
          - name: Mail
            path: microservices/mail
          - name: Read
            path: microservices/read
          - name: Score
            path: microservices/score
          - name: Target
            path: microservices/target
          - name: Upload
            path: microservices/upload

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.service.path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.service.path }}
        run: npm ci

  service-test:
    name: Run Unit Tests (${{ matrix.service.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: Auth
            path: auth
          - name: Target
            path: microservices/target
          - name: Upload
            path: microservices/upload

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.service.path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.service.path }}
        run: npm ci

      - name: Run unit tests
        working-directory: ${{ matrix.service.path }}
        run: npm test
