name: Deployment Readiness

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Doelomgeving"
        required: true
        default: "acceptatie"
        type: choice
        options:
          - acceptatie
          - productie

permissions:
  contents: read

jobs:
  prepare-release:
    name: Prepare Release Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Upload source artifact
        uses: actions/upload-artifact@v7
        with:
          name: devops-source
          path: |
            API-gateway
            auth
            microservices
            .github
            docker-compose.yml
            docker-stack.yml
            .env.docker.example
            package.json
            package-lock.json
            eslint.config.js

  deploy-acceptatie:
    name: Deploy To Acceptatie
    runs-on: ubuntu-latest
    needs: prepare-release
    if: github.ref == 'refs/heads/dev' || (github.event_name == 'workflow_dispatch' && inputs.target_environment == 'acceptatie')
    environment:
      name: acceptatie

    steps:
      - name: Download source artifact
        uses: actions/download-artifact@v4
        with:
          name: devops-source

      - name: Deployment placeholder
        run: echo "Vervang deze stap door echte deployment naar acceptatie."

  deploy-productie:
    name: Deploy To Productie
    runs-on: ubuntu-latest
    needs: prepare-release
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && inputs.target_environment == 'productie')
    environment:
      name: productie

    steps:
      - name: Download source artifact
        uses: actions/download-artifact@v4
        with:
          name: devops-source

      - name: Deployment placeholder
        run: echo "Vervang deze stap door echte deployment naar productie."
