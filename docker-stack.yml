services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - devops-overlay
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - devops-overlay
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    ports:
      - "9115:9115"
    command:
      - "--config.file=/etc/blackbox_exporter/config.yml"
    volumes:
      - ./monitoring/blackbox/config.yml:/etc/blackbox_exporter/config.yml:ro
    networks:
      - devops-overlay
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - devops-overlay
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  grafana:
    image: grafana/grafana:11.1.4
    ports:
      - "3100:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - devops-overlay
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  auth:
    image: devops/auth:latest
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/AuthDB
      RABBITMQ_URL: amqp://rabbitmq:5672
      JWT_SECRET: ${JWT_SECRET:-password}
      GATEWAY_KEY: ${GATEWAY_KEY:-supersecretkey123}
    volumes:
      - auth_runtime:/usr/src/app/runtime
    networks:
      - devops-overlay
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  target:
    image: devops/target:latest
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      MONGO_URI: mongodb://mongo:27017/targetservice
      RABBITMQ_URL: amqp://rabbitmq:5672
      JWT_SECRET: ${JWT_SECRET:-password}
      GATEWAY_KEY: ${GATEWAY_KEY:-supersecretkey123}
    volumes:
      - target_runtime:/usr/src/app/runtime
    networks:
      - devops-overlay
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  upload:
    image: devops/upload:latest
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      MONGO_URI: mongodb://mongo:27017/UploadDB
      RABBITMQ_URL: amqp://rabbitmq:5672
      JWT_SECRET: ${JWT_SECRET:-password}
      GATEWAY_KEY: ${GATEWAY_KEY:-supersecretkey123}
    volumes:
      - upload_runtime:/usr/src/app/runtime
    networks:
      - devops-overlay
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  read:
    image: devops/read:latest
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      MONGO_URI: mongodb://mongo:27017/readService
      RABBITMQ_URL: amqp://rabbitmq:5672
      JWT_SECRET: ${JWT_SECRET:-password}
      GATEWAY_KEY: ${GATEWAY_KEY:-supersecretkey123}
    volumes:
      - read_runtime:/usr/src/app/runtime
    networks:
      - devops-overlay
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  score:
    image: devops/score:latest
    ports:
      - "3005:3005"
    environment:
      PORT: 3005
      MONGO_URI: mongodb://mongo:27017/ScoreDB
      RABBITMQ_URL: amqp://rabbitmq:5672
      JWT_SECRET: ${JWT_SECRET:-password}
      GATEWAY_KEY: ${GATEWAY_KEY:-supersecretkey123}
      IMAGGA_API_KEY: ${IMAGGA_API_KEY:-}
      IMAGGA_API_SECRET: ${IMAGGA_API_SECRET:-}
    volumes:
      - score_runtime:/usr/src/app/runtime
    networks:
      - devops-overlay
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  clock:
    image: devops/clock:latest
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      MONGO_URI: mongodb://mongo:27017/ClockDB
      RABBITMQ_URL: amqp://rabbitmq:5672
      JWT_SECRET: ${JWT_SECRET:-password}
      GATEWAY_KEY: ${GATEWAY_KEY:-supersecretkey123}
    volumes:
      - clock_runtime:/usr/src/app/runtime
    networks:
      - devops-overlay
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  mail:
    image: devops/mail:latest
    ports:
      - "3006:3006"
    environment:
      PORT: 3006
      RABBITMQ_URL: amqp://rabbitmq:5672
      EMAIL_USER: ${EMAIL_USER:-change-me@example.com}
      EMAIL_PASS: ${EMAIL_PASS:-change-me}
    volumes:
      - mail_runtime:/usr/src/app/runtime
    networks:
      - devops-overlay
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  api-gateway:
    image: devops/api-gateway:latest
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-password}
      GATEWAY_KEY: ${GATEWAY_KEY:-supersecretkey123}
      TARGET_SERVICE_URL: http://target:3003/
      UPLOAD_SERVICE_URL: http://upload:3002/
      READ_SERVICE_URL: http://read:3004/
    volumes:
      - api_gateway_runtime:/usr/src/app/runtime
    networks:
      - devops-overlay
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

networks:
  devops-overlay:
    driver: overlay
    attachable: true

volumes:
  mongo_data:
  rabbitmq_data:
  api_gateway_runtime:
  auth_runtime:
  target_runtime:
  upload_runtime:
  read_runtime:
  score_runtime:
  clock_runtime:
  mail_runtime:
  prometheus_data:
  grafana_data:


